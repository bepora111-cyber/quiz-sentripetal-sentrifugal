<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Batagor Sahabat</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

html,
body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    overflow:hidden;
}

#map{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
}

/* ================= QUIZ BOX ================= */

/* ================= QUIZ BOX ================= */

.quiz-box{
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);

    z-index: 1000;
    width: 340px;
    padding: 22px;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,.35);
    transition: .4s;

    background-image: url('images/unnamed.webp');
    background-size: cover;
    background-position: center;
}

.quiz-box::before{
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 25px;
    transition: .4s;
}

.quiz-box > *{
    position: relative;
    z-index: 2;
}
.quiz-box h2{
    font-size:23px;
    margin-bottom:20px;
    line-height:1.4;
}


.quiz-box button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:15px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.quiz-box button:hover{
    transform:scale(1.03);
}

/* ================= LIGHT MODE ================= */

body.light{
    background:#f4f4f4;
    color:#111;
}

body.light .quiz-box{
    color:#111;
}

body.light .quiz-box::before{
    background:rgba(255,255,255,.20);
}

body.light button{
    background:rgba(255,255,255,.9);
    color:#111;
}

/* ================= DARK MODE ================= */

body.dark{
    background:#121212;
    color:#fff;
}

body.dark .quiz-box{
    color:#fff;
    filter:brightness(.82);
}

body.dark .quiz-box::before{
    background:rgba(40,0,0,.25);
}

body.dark button{
    background:rgba(35,35,35,.9);
    color:white;
}

/* ================= HASIL ================= */

.benar{
    background:#18c964 !important;
    color:white !important;
}

.salah{
    background:#f31260 !important;
    color:white !important;
}
.order-btn{
    display:block;
    margin-top:15px;
    padding:14px 18px;
    text-align:center;
    color:white;
    font-weight:bold;
    border-radius:14px;
    text-decoration:none;
    background: linear-gradient(270deg, #00c853, #69f0ae, #00e676, #2e7d32);
    background-size: 400% 400%;
    animation: gradientMove 4s ease infinite;
    transition: transform 0.3s ease;
    box-shadow: 0 0 20px rgba(0,255,100,0.4);
}

/* hover efek */
.order-btn:hover{
    transform: scale(1.05);
}

/* animasi gradien bergerak */
@keyframes gradientMove {
    0%{
        background-position: 0% 50%;
    }
    50%{
        background-position: 100% 50%;
    }
    100%{
        background-position: 0% 50%;
    }
}
@media (max-width: 768px){
    .leaflet-control-zoom{
        display: none !important;
    }
}
</style>
</head>
<body>

<div class="quiz-box">
    <h2 id="question">
        Di negara manakah posisi Batagor Sahabat?
    </h2>

    <button id="btnA" onclick="jawab('A')">
        A. Kanada
    </button>

    <button id="btnB" onclick="jawab('B')">
        B. Indonesia
    </button>

    <button id="ulangBtn"
            onclick="location.reload()"
            style="display:none;">
        🔄 Ulangi Kuis
    </button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ================= MAP =================
 let btnA, btnB, question;
const map = L.map('map', {
    zoomControl: false
}).setView([20,0],2);

L.control.zoom({
    position: 'topright'
}).addTo(map);

const lightLayer = L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
});

const darkLayer = L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
{
    subdomains:'abcd',
    maxZoom:19
});

// ================= AUTO DARK MODE =================

const jam = new Date().getHours();

if (jam >= 18 || jam < 6){
    document.body.classList.add('dark');
    darkLayer.addTo(map);
}
else{
    document.body.classList.add('light');
    lightLayer.addTo(map);
}

// ================= QUIZ =================

let tahap = 1;

function salah(btn){
    btn.classList.add('salah');

    document.getElementById('btnA').disabled = true;
    document.getElementById('btnB').disabled = true;

    document.getElementById('ulangBtn').style.display =
        'block';
}
function handleBenar(btn){
    playCorrect();
    btn.classList.add('benar');

    btnA.disabled = true;
    btnB.disabled = true;
}
function handleSalah(btn){
    playWrong();
    salah(btn);
}
function jawab(pilihan){
btnA = document.getElementById('btnA');
btnB = document.getElementById('btnB');
question = document.getElementById('question');

    // ================= TAHAP 1 =================
    if(tahap === 1){

    if(pilihan === 'A'){
        handleSalah(btnA);
        return;
    }

    handleBenar(btnB);

    setTimeout(() => {

        map.flyTo(
            [-2.5489,118.0149],
            5,
            {
                animate:true,
                duration:4
            }
        );

        setTimeout(() => {

            tahap = 2;

            question.innerHTML =
                'Di provinsi manakah Batagor Sahabat berada?';

            btnA.className = '';
            btnB.className = '';

            btnA.disabled = false;
            btnB.disabled = false;

            btnA.innerHTML = 'A. Jawa Barat';
            btnB.innerHTML = 'B. Jawa Tengah';

        },4000);

    },500);
}

    // ================= TAHAP 2 =================
    else if(tahap === 2){

        if(pilihan === 'B'){
        handleSalah(btnB);
        return;
    }

    handleBenar(btnA);


        btnA.classList.add('benar');

        setTimeout(() => {

            map.flyTo(
                [-6.9039,107.6186],
                8,
                {
                    animate:true,
                    duration:4
                }
            );

            setTimeout(() => {

                tahap = 3;

                question.innerHTML =
                    'Di kota manakah Batagor Sahabat berada?';

                btnA.className = '';
                btnB.className = '';

                btnA.disabled = false;
                btnB.disabled = false;

                btnA.innerHTML =
                    'A. Bogor';

                btnB.innerHTML =
                    'B. Bandung';

            },4000);

        },500);
    }

    // ================= TAHAP 3 =================
    else if(tahap === 3){

        if(pilihan === 'A'){
        handleSalah(btnA);
        return;
    }

    handleBenar(btnB);


        btnB.classList.add('benar');

        setTimeout(() => {

            map.flyTo(
                [-6.9175,107.6191],
                11,
                {
                    animate:true,
                    duration:4
                }
            );

            setTimeout(() => {

                tahap = 4;

                question.innerHTML =
                    'Di jalan apakah Batagor Sahabat berada?';

                btnA.className = '';
                btnB.className = '';

                btnA.disabled = false;
                btnB.disabled = false;

                btnA.innerHTML =
                    'A. Jenderal Sudirman';

                btnB.innerHTML =
                    'B. Pasir Kaliki';

            },4000);

        },500);
    }

    // ================= TAHAP 4 =================
    else if(tahap === 4){

   if(pilihan === 'B'){
        handleSalah(btnB);
        return;
    }

    handleBenar(btnA);


    btnA.classList.add('benar');

    setTimeout(() => {

        map.flyTo(
            [-6.9195893, 107.590871],
            18,
            {
                animate: true,
                duration: 4
            }
        );

        // tunggu sampai animasi peta selesai (4 detik + buffer 500ms)
        setTimeout(() => {

            document.querySelector('.quiz-box').innerHTML = `
    <h2 style="text-align:center;line-height:1.6;">
        🎉 Selamat kamu berhasil menemukan lokasi Batagor Sahabat dengan benar!
    </h2>

   <a href="https://batagorsahabat.my.canva.site/online-order"
   target="_blank"
   class="order-btn"
   onclick="playDing()">
    Pesan Batagor Sahabat Sekarang!
</a>
`;
        }, 4500);

    }, 500);
}
}
function playDing(){
    const sound = document.getElementById("dingSound");
    sound.currentTime = 0;
    sound.play();
}
function playCorrect(){
    const s = document.getElementById("soundCorrect");
    s.currentTime = 0;
    s.play().catch(()=>{});
}

function playWrong(){
    const s = document.getElementById("soundWrong");
    s.currentTime = 0;
    s.play().catch(()=>{});
}
</script>
<audio id="dingSound" src="https://assets.mixkit.co/active_storage/sfx/2357/2357-preview.mp3" preload="auto"></audio>
<audio id="soundCorrect" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>
<audio id="soundWrong" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" preload="auto"></audio>
</body>
</html>
